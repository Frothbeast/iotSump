services:
  database:
    image: mysql:8.0
    restart: always
    environment:
      - TZ=America/Toronto
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - sump-network

  sump-service:
    build: 
      context: .
      args:
        - REACT_APP_SUMP_API_URL=${REACT_APP_SUMP_API_URL}
    environment:
      - TZ=America/Toronto
    restart: always
    ports:
      - "${API_PORT}:${API_PORT}"
    env_file: ../iotSump/.env
    depends_on:
      - database
    networks:
      - sump-network

networks:
  sump-network:
    driver: bridge

volumes:
  db_data:
